name: API Question
description: Ask a question about the Vanish API
title: "[API] "
labels: ["api", "question"]
body:
  - type: markdown
    attributes:
      value: |
        Please check the [API Documentation](../../API.md) before asking a question.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe your question about the API.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context, code snippets, or details about your integration.
      render: java
    validations:
      required: false

