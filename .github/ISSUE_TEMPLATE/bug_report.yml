name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us resolve it.

  - type: input
    id: minecraft-version
    attributes:
      label: Minecraft Version
      placeholder: e.g. 1.21.1
    validations:
      required: true

  - type: dropdown
    id: server-software
    attributes:
      label: Server Software
      options:
        - Spigot
        - Paper
        - Other
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: Run `/vanish info` to find this.
      placeholder: e.g. 3.0.1
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run /vanish
        2. Open a chest
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console Errors
      description: Paste any relevant console errors here.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: optional-plugins
    attributes:
      label: Optional Plugins Installed
      options:
        - label: ProtocolLib
        - label: PlaceholderAPI
        - label: Dynmap

